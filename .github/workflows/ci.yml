name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [bet-maker, line-provider]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: postgres
      RABBITMQ_HOST: localhost
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      EXCHANGE_NAME: default_exchange
      EVENT_UPDATE_QUEUE_NAME: event_updates_queue
      REQUEST_QUEUE_NAME: bet_request_queue
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.5

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ matrix.service }}-${{ hashFiles(format('{0}/poetry.lock', matrix.service)) }}

      - name: Install dependencies
        run: poetry install --no-root

      - name: Apply migrations
        run: poetry run alembic upgrade head

      - name: Check formatting (black)
        run: poetry run black --check .

      - name: Check import order (isort)
        run: poetry run isort --check .

      - name: Run tests
        run: poetry run pytest -v
